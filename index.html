    function initDatabase() {
      try {
        if (localStorage.getItem('cat_users')) JSON.parse(localStorage.getItem('cat_users'));
        if (localStorage.getItem('cat_soal')) JSON.parse(localStorage.getItem('cat_soal'));
        if (localStorage.getItem('cat_tryout')) JSON.parse(localStorage.getItem('cat_tryout'));
        if (localStorage.getItem('cat_riwayat')) JSON.parse(localStorage.getItem('cat_riwayat'));
      } catch (err) {
        localStorage.removeItem('cat_users');
        localStorage.removeItem('cat_soal');
        localStorage.removeItem('cat_tryout');
        localStorage.removeItem('cat_riwayat');
      }

      if (!localStorage.getItem('cat_users')) localStorage.setItem('cat_users', JSON.stringify(DEFAULT_USERS));
      if (!localStorage.getItem('cat_soal')) localStorage.setItem('cat_soal', JSON.stringify(DEFAULT_SOAL));
      if (!localStorage.getItem('cat_tryout')) localStorage.setItem('cat_tryout', JSON.stringify(DEFAULT_TRYOUT));
      if (!localStorage.getItem('cat_riwayat')) localStorage.setItem('cat_riwayat', JSON.stringify(DEFAULT_RIWAYAT));
    }

    // Defensive array getter to prevent errors
    const getDB = (key) => {
      try {
        const parsed = JSON.parse(localStorage.getItem(key));
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    };

    const setDB = (key, data) => {
      try {
        localStorage.setItem(key, JSON.stringify(data));
      } catch (e) {
        console.error("Localstorage write failed", e);
      }
    };

    function showModal(title, message, iconType = 'warning', showCancel = false, onOk = null) {
      const modal = document.getElementById('custom-modal');
      const titleEl = document.getElementById('modal-title');
      const msgEl = document.getElementById('modal-message');
      const iconEl = document.getElementById('modal-icon');
      const btnCancel = document.getElementById('modal-btn-cancel');
      const btnOk = document.getElementById('modal-btn-ok');

      if (!modal || !titleEl || !msgEl || !iconEl || !btnCancel || !btnOk) return;

      titleEl.innerText = title;
      msgEl.innerText = message;

      if (iconType === 'success') {
        iconEl.className = "p-2 bg-emerald-100 text-emerald-700 rounded-full";
        iconEl.innerHTML = `<i class="fa-solid fa-circle-check text-xl"></i>`;
      } else if (iconType === 'error') {
        iconEl.className = "p-2 bg-rose-100 text-rose-700 rounded-full";
        iconEl.innerHTML = `<i class="fa-solid fa-circle-xmark text-xl"></i>`;
      } else {
        iconEl.className = "p-2 bg-amber-100 text-amber-700 rounded-full";
        iconEl.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-xl"></i>`;
      }

      if (showCancel) {
        btnCancel.classList.remove('hidden');
      } else {
        btnCancel.classList.add('hidden');
      }

      modal.classList.remove('hidden');
      setTimeout(() => modal.classList.add('opacity-100'), 10);

      const newBtnOk = btnOk.cloneNode(true);
      if (btnOk.parentNode) btnOk.parentNode.replaceChild(newBtnOk, btnOk);
      const newBtnCancel = btnCancel.cloneNode(true);
      if (btnCancel.parentNode) btnCancel.parentNode.replaceChild(newBtnCancel, btnCancel);

      newBtnOk.addEventListener('click', () => {
        closeModal();
        if (onOk) onOk();
      });

      newBtnCancel.addEventListener('click', closeModal);
    }

    function closeModal() {
      const modal = document.getElementById('custom-modal');
      if (modal) {
        modal.classList.remove('opacity-100');
        setTimeout(() => modal.classList.add('hidden'), 300);
      }
    }

      const mat = matEl.value;

    function renderAnalyticsChart() {
      if (typeof Chart === 'undefined') return;

      const allRiwayat = (getDB('cat_riwayat') || []).filter(r => r && r.id_user === currentUser.id_user);
      const allSoal = (getDB('cat_soal') || []).filter(s => s && s.status_review === 'published');
      const canvas = document.getElementById('analyticsChart');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      if (!ctx) return;

      let datasets = {
        "TWK": { benar: 0, total: 0 },
        "TIU": { benar: 0, total: 0 },
        "TKP": { benar: 0, total: 0 }
      };

      let subDatasets = {};

      allRiwayat.forEach(rw => {
        const jawabanPeserta = rw.jawaban_peserta || {};
        for (const [id_soal, jwb] of Object.entries(jawabanPeserta)) {
          const soal = allSoal.find(s => s && s.id_soal === id_soal);
          if (soal) {
            const kat = soal.kategori;
            const subKat = soal.sub_kategori;
            const bobotValues = soal.bobot_nilai ? Object.values(soal.bobot_nilai) : [];
            const bobotMax = bobotValues.length > 0 ? Math.max(...bobotValues) : 5;
            const skorDapat = (soal.bobot_nilai && soal.bobot_nilai[jwb]) || 0;

            if (datasets[kat]) {
              datasets[kat].total += bobotMax;
              datasets[kat].benar += skorDapat;
            }

            if (kat) {
              if (!subDatasets[kat]) subDatasets[kat] = {};
              if (!subDatasets[kat][subKat]) subDatasets[kat][subKat] = { benar: 0, total: 0 };
              
              subDatasets[kat][subKat].total += bobotMax;
              subDatasets[kat][subKat].benar += skorDapat;
            }
          }
        }
      });

      let labels = [];
      let dataValues = [];

      const resetBtn = document.getElementById('btn-chart-reset');
      const descEl = document.getElementById('chart-desc');

      if (!currentDrilldownCategory) {
        if (resetBtn) resetBtn.classList.add('hidden');
        if (descEl) descEl.innerText = "Menampilkan rata-rata akurasi kategori utama. Klik grafik untuk melihat detail sub-kategori.";
        labels = ["TWK", "TIU", "TKP"];
        dataValues = [
          datasets["TWK"].total > 0 ? Math.round((datasets["TWK"].benar / datasets["TWK"].total) * 100) : 0,
          datasets["TIU"].total > 0 ? Math.round((datasets["TIU"].benar / datasets["TIU"].total) * 100) : 0,
          datasets["TKP"].total > 0 ? Math.round((datasets["TKP"].benar / datasets["TKP"].total) * 100) : 0
        ];
      } else {
        if (resetBtn) resetBtn.classList.remove('hidden');
        if (descEl) descEl.innerText = `Menampilkan materi detail untuk Kategori ${currentDrilldownCategory}.`;
        
        const subs = KATEGORI_MAP[currentDrilldownCategory] || [];
        subs.forEach(sub => {
          labels.push(sub);
          const val = subDatasets[currentDrilldownCategory]?.[sub];
          dataValues.push(val && val.total > 0 ? Math.round((val.benar / val.total) * 100) : 0);
        });
      }

      if (activeChart) activeChart.destroy();

      activeChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Akurasi (%)',
            data: dataValues,
            backgroundColor: currentDrilldownCategory ? 'rgba(245, 158, 11, 0.2)' : 'rgba(79, 70, 229, 0.2)',
            borderColor: currentDrilldownCategory ? 'rgb(245, 158, 11)' : 'rgb(79, 70, 229)',
            borderWidth: 2,
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          onClick: (e, elements) => {
            if (elements && elements.length > 0 && !currentDrilldownCategory) {
              const clickedIdx = elements[0].index;
              if (clickedIdx !== undefined && labels[clickedIdx]) {
                currentDrilldownCategory = labels[clickedIdx];
                renderAnalyticsChart();
              }
            }
          },
          scales: {
            y: { beginAtZero: true, max: 100 }
          },
          plugins: {
            legend: { display: false }
          }
        }
      });

      const rekEl = document.getElementById('rekomendasi-belajar');
      if (rekEl) {
        const minVal = Math.min(...dataValues);
        const minIdx = dataValues.indexOf(minVal);

        if (minVal < 65 && labels.length > 0) {
          const materiLemah = labels[minIdx];
          rekEl.innerHTML = `
            <div class="bg-amber-50 rounded-xl p-3 border border-amber-200">
              <h4 class="text-xs font-bold text-amber-800 mb-1 flex items-center">
                <i class="fa-solid fa-circle-exclamation mr-1.5 text-sm"></i> Rekomendasi Belajar
              </h4>
              <p class="text-[11px] text-amber-700 leading-normal">
                Kemampuan Anda di materi <strong>${materiLemah}</strong> terdeteksi masih rendah (${minVal}%). Disarankan melakukan Latihan Mandiri fokus materi tersebut.
              </p>
            </div>
          `;
        } else {
          rekEl.innerHTML = `
            <div class="bg-emerald-50 rounded-xl p-3 border border-emerald-200">
              <h4 class="text-xs font-bold text-emerald-800 mb-1 flex items-center">
                <i class="fa-solid fa-star mr-1.5 text-sm"></i> Performa Mantap!
              </h4>
              <p class="text-[11px] text-emerald-700 leading-normal">
                Pertahankan konsistensi latihan Anda untuk menjaga tingkat akurasi tetap tinggi sebelum masa seleksi dimulai.
              </p>
            </div>
          `;
        }
      }
    }

    function resetDrilldownChart() {
      currentDrilldownCategory = null;
      renderAnalyticsChart();
    }

    let activeRankTab = 'nasional';

    function switchRankTab(tab) {
      activeRankTab = tab;
      const nasTab = document.getElementById('rank-tab-nasional');
      const wilTab = document.getElementById('rank-tab-wilayah');
      if (nasTab && wilTab) {
        nasTab.className = tab === 'nasional' ? 'flex-1 pb-2 border-b-2 border-indigo-600 font-bold text-indigo-600' : 'flex-1 pb-2 border-b-2 border-transparent text-slate-500';
        wilTab.className = tab === 'wilayah' ? 'flex-1 pb-2 border-b-2 border-indigo-600 font-bold text-indigo-600' : 'flex-1 pb-2 border-b-2 border-transparent text-slate-500';
      }
      renderLeaderboards(tab);
    }

    function renderLeaderboards(tab) {
      const riwayat = getDB('cat_riwayat') || [];
      const users = getDB('cat_users') || [];
      const container = document.getElementById('ranking-list-container');
      if (!container) return;

      const bestScores = {};
      riwayat.filter(r => r && r.tipe_aktivitas === 'tryout').forEach(r => {
        const userObj = users.find(u => u && u.id_user === r.id_user);
        if (userObj) {
          if (!bestScores[r.id_user] || bestScores[r.id_user].skor < r.skor_total) {
            bestScores[r.id_user] = {
              nama: userObj.nama,
              wilayah: userObj.wilayah,
              skor: r.skor_total
            };
          }
        }
      });

      let rankingArr = Object.values(bestScores).sort((a,b) => b.skor - a.skor);

      if (tab === 'wilayah' && currentUser) {
        const userWilayah = currentUser.wilayah || 'Jawa Barat';
        rankingArr = rankingArr.filter(r => r && r.wilayah === userWilayah);
      }

      if (rankingArr.length === 0) {
        container.innerHTML = `<p class="text-xs text-slate-400 text-center py-6">Belum ada riwayat kompetisi.</p>`;
        return;
      }

      container.innerHTML = rankingArr.map((rk, idx) => {
        let goldMedal = "";
        if (idx === 0) goldMedal = "🥇";
        if (idx === 1) goldMedal = "🥈";
        if (idx === 2) goldMedal = "🥉";

        return `
          <div class="flex items-center justify-between p-2.5 border border-slate-100 rounded-xl bg-slate-50/50 hover:bg-slate-50 transition text-xs">
            <div class="flex items-center space-x-2.5">
              <span class="font-extrabold text-slate-500 w-5">${goldMedal || (idx + 1)}</span>
              <div>
                <h5 class="font-bold text-slate-800">${rk.nama}</h5>
                <span class="text-[10px] text-slate-400 block">${rk.wilayah}</span>
              </div>
            </div>
            <strong class="text-indigo-600 font-extrabold">${rk.skor} Pts</strong>
          </div>
        `;
      }).join('');
    }

    function renderRiwayatList() {
      if (!currentUser) return;
      const allRiwayat = (getDB('cat_riwayat') || []).filter(r => r && r.id_user === currentUser.id_user);

        return;
      }

        const dateStr = new Date(rw.waktu_selesai).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
        const isTO = rw.tipe_aktivitas === 'tryout';
        
        return `

    function processMulaiLatihanMandiri(materi, sub, jumlah) {
      const allSoal = (getDB('cat_soal') || []).filter(s => s && s.status_review === 'published');
      
      let filteredSoal = allSoal.filter(s => s && s.kategori === materi);
      if (sub !== 'ALL') {
        filteredSoal = filteredSoal.filter(s => s && s.sub_kategori === sub);
      }

      if (filteredSoal.length === 0) {
        showModal("Latihan Gagal", `Maaf, belum ada butir soal yang di-publish untuk materi ${materi} - ${sub}.`, "error");
        return;
      }

      const shuffled = filteredSoal.sort(() => 0.5 - Math.random());
      const selected = shuffled.slice(0, jumlah);

      setupExamSession('latihan_mandiri', '', `Latihan Mandiri ${materi}`, selected, 15, materi);
    }

    function switchAdminTab(tab) {
      const buttons = document.querySelectorAll('[id^="tab-btn-"]');
      buttons.forEach(btn => {
        btn.classList.remove('border-indigo-600', 'text-indigo-600', 'bg-white');
        btn.classList.add('border-transparent', 'text-slate-500');
      });

      const activeBtn = document.getElementById(`tab-btn-${tab}`);
      if (activeBtn) {
        activeBtn.classList.remove('border-transparent', 'text-slate-500');
        activeBtn.classList.add('border-indigo-600', 'text-indigo-600', 'bg-white');
      }

      const panel = document.getElementById('admin-panel-content');
      if (!panel) return;
      
      if (tab === 'draft') renderPanelDraft(panel);
      else if (tab === 'input') renderPanelInput(panel);
      else if (tab === 'kelola') renderPanelKelola(panel);
      else if (tab === 'tryout') renderPanelTryout(panel);
      else if (tab === 'users') renderPanelUsers(panel);
    }

            id_tryout: nextID,
            judul_tryout: document.getElementById('to-judul') ? document.getElementById('to-judul').value : "Untitled TO",
            tipe: document.getElementById('to-tipe') ? document.getElementById('to-tipe').value : "free",
            durasi_menit: document.getElementById('to-durasi') ? parseInt(document.getElementById('to-durasi').value) : 30,
            daftar_id_soal: selectedIds,
            status: "active"
          };

          list.push(newTO);
          setDB('cat_tryout', list);

          showModal("Berhasil", "Paket Try Out baru telah dirilis.", "success");
          renderDashboardAdmin();
        });
      }
    }

    function hapusTryout(id) {
      showModal("Hapus TO?", "Yakin ingin menghapus paket try out?", "warning", true, () => {
        const list = getDB('cat_tryout') || [];
        const filtered = list.filter(t => t && t.id_tryout !== id);
        setDB('cat_tryout', filtered);
        showModal("Terhapus", "Paket dihapus.", "success");
        renderDashboardAdmin();
      });
    }

    function renderPanelUsers(container) {
      const users = getDB('cat_users') || [];
      container.innerHTML = `
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 text-xs">
          <div class="border border-slate-200 rounded-xl p-5 bg-white space-y-3">
            <h4 class="font-bold text-slate-800 pb-2 border-b">Tambah Staf Admin</h4>
            <form id="form-staf-baru" class="space-y-3">
              <div>
                <label class="block font-bold text-slate-600 mb-1">Nama</label>
                <input type="text" id="staf-nama" required class="w-full border border-slate-300 rounded-lg p-1.5 outline-none">
              </div>
              <div>
                <label class="block font-bold text-slate-600 mb-1">Email</label>
                <input type="email" id="staf-email" required class="w-full border border-slate-300 rounded-lg p-1.5 outline-none">
              </div>
              <div>
                <label class="block font-bold text-slate-600 mb-1">Peran khusus</label>
                <select id="staf-role" class="w-full border border-slate-300 rounded-lg p-1.5 outline-none">
                  <option value="admin_input">Admin Input Soal</option>
                  <option value="admin_reviewer">Admin Reviewer Soal</option>
                </select>
              </div>
              <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-lg transition">Tambahkan</button>
            </form>
          </div>

          <div class="lg:col-span-2 space-y-3">
            <h4 class="font-bold text-slate-800">Daftar Tim Manajemen</h4>
            <div class="border border-slate-200 rounded-xl overflow-hidden bg-white">
              <table class="w-full text-left border-collapse">
                <thead>
                  <tr class="bg-slate-100 text-slate-600 font-bold border-b border-slate-200">
                    <th class="p-3">Nama</th>
                    <th class="p-3">Peran</th>
                    <th class="p-3 text-right">Aksi</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-slate-200">
                  ${users.map(u => `
                    <tr class="hover:bg-slate-50">
                      <td class="p-3 font-semibold">${u.nama}</td>
                      <td class="p-3 font-mono">${u.role}</td>
                      <td class="p-3 text-right">
                        ${(currentUser && u.id_user === currentUser.id_user) ? `<span class="italic text-slate-400">Aktif</span>` : `
                          <button onclick="hapusUser('${u.id_user}')" class="text-rose-500 font-bold">Hapus</button>
                        `}
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;

      const formStaf = document.getElementById('form-staf-baru');
      if (formStaf) {
        formStaf.addEventListener('submit', function(e) {
          e.preventDefault();
          const list = getDB('cat_users') || [];
          const nextID = "USR" + String(list.length + 1).padStart(3, '0');

          const nameEl = document.getElementById('staf-nama');
          const emailEl = document.getElementById('staf-email');
          const roleEl = document.getElementById('staf-role');

          const newU = {
            id_user: nextID,
            nama: nameEl ? nameEl.value : "Staf Baru",
            email: emailEl ? emailEl.value : "",
            role: roleEl ? roleEl.value : "admin_input",
            access_level: "free",
            wilayah: "DKI Jakarta"
          };

          list.push(newU);
          setDB('cat_users', list);

          showModal("Staf Ditambahkan", "Gunakan email tersebut untuk login dengan password apa saja.", "success");
          renderDashboardAdmin();
        });
      }
    }

    function hapusUser(id) {
      showModal("Hapus Staf?", "Yakin ingin mencabut hak akses staf?", "warning", true, () => {
        const list = getDB('cat_users') || [];
        const filtered = list.filter(u => u && u.id_user !== id);
        setDB('cat_users', filtered);
        showModal("Sukses", "Akses staf dihapus.", "success");
        renderDashboardAdmin();
      });
    }

    function startTryout(id) {
      const to = (getDB('cat_tryout') || []).find(t => t && t.id_tryout === id);
      const allSoal = (getDB('cat_soal') || []).filter(s => s && s.status_review === 'published');
      
      if (!to) return;
      const list = to.daftar_id_soal ? to.daftar_id_soal.map(sid => allSoal.find(s => s && s.id_soal === sid)).filter(Boolean) : [];

      if (list.length === 0) {
        showModal("Gagal", "Soal tryout belum siap atau belum di-publish oleh reviewer.", "error");
        return;
      }

      setupExamSession('tryout', to.id_tryout, to.judul_tryout, list, to.durasi_menit);
    }

    function setupExamSession(type, toId, title, listSoal, durasiM, katLat = "") {
      testSession = {
        tipe_aktivitas: type,
        id_tryout: toId,
        judul_ujian: title,
        kategori_latihan: katLat,
        soal: listSoal,
        jawaban: {}, 
        index_aktif: 0,
        detik_tersisa: (durasiM || 15) * 60,
        waktu_mulai: new Date().toISOString()
      };

      navigate('ujian');
      startExamTimer();
    }

    let timerInterval = null;
    function startExamTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (!testSession || activePage !== 'ujian') {
          clearInterval(timerInterval);
          return;
        }

        testSession.detik_tersisa--;

        const m = Math.floor(testSession.detik_tersisa / 60);
        const s = testSession.detik_tersisa % 60;
        const formatted = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

        const timerEl = document.getElementById('exam-timer');
        if (timerEl) {
          timerEl.innerText = formatted;
          if (testSession.detik_tersisa <= 60) {
            timerEl.className = "text-xl font-mono font-black text-rose-500 animate-pulse";
          }
        }

        if (testSession.detik_tersisa <= 0) {
          clearInterval(timerInterval);
          finishUjianAuto();
        }
      }, 1000);
    }

    function renderUjian() {
      const main = document.getElementById('main-content');
      if (!testSession || !main) {
        if (main) main.innerHTML = `<p class="text-center py-12 text-slate-400">Tidak ada ujian aktif.</p>`;
        return;
      }

      const activeIdx = testSession.index_aktif;
      const totalSoal = testSession.soal.length;
      const soalAktif = testSession.soal[activeIdx];
      const jwbDipilih = testSession.jawaban[soalAktif.id_soal] || null;

      main.innerHTML = `
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
          <div class="lg:col-span-1 space-y-4 order-2 lg:order-1">
            <div class="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm text-center">
              <span class="text-xs text-slate-400 font-bold block mb-1">Sisa Waktu Ujian</span>
              <div class="text-3xl font-mono font-black text-indigo-900" id="exam-timer">--:--</div>
            </div>

            <div class="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm">
              <h4 class="text-xs font-extrabold text-slate-800 mb-3 uppercase">Navigasi Nomor</h4>
              <div class="grid grid-cols-5 gap-2">
                ${testSession.soal.map((s, idx) => {
                  const terisi = testSession.jawaban[s.id_soal] ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600';
                  const aktifBorder = idx === activeIdx ? 'ring-4 ring-amber-400 font-black' : '';
                  return `
                    <button onclick="pindahSoal(${idx})" class="w-full aspect-square text-xs font-bold rounded-lg flex items-center justify-center transition ${terisi} ${aktifBorder}">
                      ${idx + 1}
                    </button>
                  `;
                }).join('')}
              </div>
            </div>

            <button onclick="confirmSelesaiUjian()" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-extrabold py-3 rounded-2xl text-sm transition flex items-center justify-center space-x-2">
              <span>Selesaikan Ujian</span>
            </button>
          </div>

          <div class="lg:col-span-3 space-y-4 order-1 lg:order-2">
            <div class="bg-white rounded-2xl p-6 md:p-8 border border-slate-100 shadow-sm space-y-6">
              <div class="flex justify-between items-center pb-4 border-b">
                <div>
                  <h2 class="text-base font-extrabold">${testSession.judul_ujian}</h2>
                  <span class="text-[9px] bg-indigo-100 text-indigo-800 px-2.5 py-0.5 rounded font-mono">${soalAktif.kategori} - ${soalAktif.sub_kategori}</span>
                </div>
                <div class="text-xs text-indigo-600 font-bold">Soal ${activeIdx + 1} dari ${totalSoal}</div>
              </div>

              <div class="text-slate-800 text-sm md:text-base font-semibold leading-relaxed">
                ${soalAktif.pertanyaan}
              </div>

              <div class="space-y-3">
                ${['A', 'B', 'C', 'D', 'E'].map(opt => {
                  const optKey = `opsi_${opt.toLowerCase()}`;
                  const isChecked = jwbDipilih === opt;
                  return `
                    <div onclick="pilihOpsi('${opt}')" class="flex items-start p-4 border rounded-xl hover:bg-slate-50 cursor-pointer transition ${isChecked ? 'border-indigo-600 bg-indigo-50/50 shadow-sm' : 'border-slate-200'}">
                      <input type="radio" name="exam-opt" value="${opt}" ${isChecked ? 'checked' : ''} class="mt-0.5 mr-3 text-indigo-600 pointer-events-none">
                      <div class="text-xs md:text-sm">
                        <strong>${opt}.</strong> ${soalAktif[optKey]}
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>

              <div class="flex justify-between pt-4 border-t">
                <button onclick="navBack()" ${activeIdx === 0 ? 'disabled' : ''} class="px-4 py-1.5 border border-slate-300 rounded-lg text-xs font-bold disabled:opacity-50">Sebelumnya</button>
                <button onclick="navNext()" ${activeIdx === totalSoal - 1 ? 'disabled' : ''} class="px-4 py-1.5 bg-indigo-600 text-white rounded-lg text-xs font-bold disabled:opacity-50">Berikutnya</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function pindahSoal(idx) {
      if (testSession) {
        testSession.index_aktif = idx;
        renderUjian();
      }
    }

    function navNext() {
      if (testSession && testSession.index_aktif < testSession.soal.length - 1) {
        testSession.index_aktif++;
        renderUjian();
      }
    }

    function navBack() {
      if (testSession && testSession.index_aktif > 0) {
        testSession.index_aktif--;
        renderUjian();
      }
    }

    function pilihOpsi(opt) {
      if (testSession) {
        const activeSoal = testSession.soal[testSession.index_aktif];
        testSession.jawaban[activeSoal.id_soal] = opt;
        renderUjian();
      }
    }

    function finishUjianAuto() {
      showModal("Waktu Habis", "Ujian selesai otomatis.", "info");
      submitJawabanUjian();
    }

    function confirmSelesaiUjian() {
      showModal("Selesaikan Ujian?", "Yakin ingin mengakhiri sesi pengerjaan?", "warning", true, () => {
        submitJawabanUjian();
      });
    }

    function submitJawabanUjian() {
      clearInterval(timerInterval);
      if (!testSession) return;

      let skorTotal = 0;
      const skorKategori = {};

      testSession.soal.forEach(s => {
        if (!s) return;
        const jwb = testSession.jawaban[s.id_soal];
        const poin = (s.bobot_nilai && s.bobot_nilai[jwb]) || 0;
        skorTotal += poin;

        if (!skorKategori[s.kategori]) skorKategori[s.kategori] = 0;
        skorKategori[s.kategori] += poin;
      });

      const list = getDB('cat_riwayat') || [];
      const nextID = "RW" + String(list.length + 1).padStart(3, '0');

      const log = {
        id_riwayat: nextID,
        id_user: currentUser ? currentUser.id_user : "USR_TEMP",
        nama_user: currentUser ? currentUser.nama : "Guest",
        wilayah_user: (currentUser && currentUser.wilayah) || "Jawa Barat",
        tipe_aktivitas: testSession.tipe_aktivitas,
        id_tryout: testSession.id_tryout,
        kategori_latihan: testSession.kategori_latihan,
        skor_total: skorTotal,
        skor_per_kategori: skorKategori,
        status_kelulusan: testSession.tipe_aktivitas === 'tryout' ? (skorTotal >= 15 ? 'Lulus' : 'Tidak Lulus') : 'N/A',
        jawaban_peserta: testSession.jawaban,
        waktu_mulai: testSession.waktu_mulai,
        waktu_selesai: new Date().toISOString()
      };

      list.push(log);
      setDB('cat_riwayat', list);

      reviewSession = log;
      testSession = null;

      showModal("Ujian Selesai", `Skor Anda: ${skorTotal} Poin.`, "success");
      navigate('review_ujian');
    }

    let reviewSession = null;

    function reviewRiwayat(id) {
      const rw = (getDB('cat_riwayat') || []).find(r => r && r.id_riwayat === id);
      if (rw) {
        reviewSession = rw;
        navigate('review_ujian');
      }
    }

    function renderReviewUjian() {
      const main = document.getElementById('main-content');
      if (!reviewSession || !main) {
        if (main) main.innerHTML = `<p class="text-center py-12 text-slate-400">Tidak ada review aktif.</p>`;
        return;
      }

      const allSoal = getDB('cat_soal') || [];
      let soalReview = [];

      if (reviewSession.tipe_aktivitas === 'tryout') {
        const to = (getDB('cat_tryout') || []).find(t => t && t.id_tryout === reviewSession.id_tryout);
        soalReview = to && to.daftar_id_soal ? to.daftar_id_soal.map(sid => allSoal.find(s => s && s.id_soal === sid)).filter(Boolean) : [];
      } else {
        const jwbPesertaObj = reviewSession.jawaban_peserta || {};
        soalReview = Object.keys(jwbPesertaObj).map(sid => allSoal.find(s => s && s.id_soal === sid)).filter(Boolean);
      }

      main.innerHTML = `
        <div class="max-w-4xl mx-auto space-y-6">
          <div class="bg-indigo-900 rounded-2xl p-6 text-white flex flex-col md:flex-row justify-between items-start md:items-center shadow">
            <div>
              <span class="text-[10px] bg-indigo-700 text-indigo-200 px-2 py-1 rounded font-bold uppercase tracking-wider mb-2 inline-block">Review Penjelasan</span>
              <h2 class="text-xl font-bold">${reviewSession.tipe_aktivitas === 'tryout' ? 'Simulasi Paket Try Out' : 'Latihan Mandiri Cerdas'}</h2>
              <p class="text-xs text-indigo-200">Selesai pada: ${new Date(reviewSession.waktu_selesai).toLocaleString()}</p>
            </div>
            <div class="mt-4 md:mt-0 flex items-center space-x-3">
              <div class="bg-indigo-800 border border-indigo-700 px-4 py-2.5 rounded-xl text-center">
                <span class="text-[10px] text-indigo-300 block">SKOR TOTAL</span>
                <span class="text-xl font-black text-amber-400">${reviewSession.skor_total} Poin</span>
              </div>
              <button onclick="navigate('dashboard_peserta')" class="bg-white hover:bg-slate-100 text-indigo-900 font-bold px-4 py-2.5 rounded-xl text-xs transition">
                Kembali ke Portal
              </button>
            </div>
          </div>

          <div class="space-y-6">
            ${soalReview.map((s, idx) => {
              const jwbPeserta = (reviewSession.jawaban_peserta && reviewSession.jawaban_peserta[s.id_soal]) || "Tidak Dijawab";
              const jwbBenar = s.kunci_jawaban;
              const isBetul = jwbPeserta === jwbBenar;

              return `
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm space-y-4">
                  <div class="flex justify-between items-center pb-2 border-b text-xs">
                    <span class="font-extrabold text-indigo-600">No. ${idx + 1} (${s.kategori} - ${s.sub_kategori})</span>
                    <span class="px-2.5 py-0.5 rounded-full font-bold ${isBetul ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}">
                      ${isBetul ? 'Sempurna' : 'Perlu Diulas'}
                    </span>
                  </div>

                  <p class="text-slate-800 font-semibold text-sm">${s.pertanyaan}</p>

                  <div class="space-y-2 text-xs">
                    ${['A', 'B', 'C', 'D', 'E'].map(opt => {
                      const text = s[`opsi_${opt.toLowerCase()}`];
                      let borderClass = "border-slate-200";
                      let bgClass = "bg-white";

                      if (opt === jwbBenar) {
                        borderClass = "border-emerald-500 ring-2 ring-emerald-100";
                        bgClass = "bg-emerald-50/30";
                      } else if (opt === jwbPeserta && !isBetul) {
                        borderClass = "border-rose-500 ring-2 ring-rose-100";
                        bgClass = "bg-rose-50/30";
                      }

                      return `
                        <div class="p-3 border rounded-xl flex justify-between items-center ${borderClass} ${bgClass}">
                          <span><strong>${opt}.</strong> ${text}</span>
                          <span class="text-[10px] text-slate-400 font-mono">Poin: ${s.bobot_nilai?.[opt] || 0}</span>
                        </div>
                      `;
                    }).join('')}
                  </div>

                  <div class="p-4 bg-indigo-50/50 rounded-xl border border-indigo-100 text-xs">
                    <strong class="text-indigo-900 block mb-1">Pembahasan Detail:</strong>
                    <p class="text-slate-600 leading-relaxed">${s.pembahasan}</p>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    window.onload = function() {
      initDatabase();
      navigate('login');
    };
  </script>
</body>
</html>
