<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAT ASN & STAN - Sistem Simulasi Mandiri</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome untuk Icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Chart.js untuk Grafik Analisis -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* RESET & BASE SHARPNESS */
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    background-color: #f8fafc; /* Slate 50: Latar belakang bersih */
    color: #1e293b; /* Slate 800: Teks tajam */
    scroll-behavior: smooth;
  }

  /* TYPOGRAPHY OPTIMIZATION */
  .soal-utama {
    font-size: 1.125rem; /* 18px */
    line-height: 1.6;
    color: #0f172a; /* Slate 900: Hitam pekat agar sangat tajam */
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .opsi-teks {
    font-size: 1rem;
    font-weight: 500;
    color: #334155;
    line-height: 1.5;
  }

  /* ANIMATIONS */
  @keyframes scaleUp {
    from { opacity: 0; transform: scale(0.98) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .animate-scale-up {
    animation: scaleUp 0.3s ease-out forwards;
  }

  /* CUSTOM COMPONENTS */
  
  /* Area kartu soal */
  .card-soal {
    background: #ffffff;
    border: 1px solid #e2e8f0; /* Slate 200 */
    border-radius: 1.25rem;
    box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
  }

  /* Item pilihan jawaban */
  .opsi-item {
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    border: 2px solid transparent;
    background: #ffffff;
    border-radius: 1rem;
    box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  }

  .opsi-item:active {
    transform: scale(0.98);
  }

  /* Utility untuk navigasi nomor di mobile */
  .nav-scroll::-webkit-scrollbar {
    display: none;
  }
  .nav-scroll {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

  /* Glassmorphism Effect untuk Header/Footer Sticky */
  .glass-effect {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid rgba(226, 232, 240, 0.8);
  }

  /* Khusus Header Sticky Ujian */
  .sticky-header-ujian {
    background: rgba(248, 250, 252, 0.8);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid #e2e8f0;
  }
</style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col antialiased">
  <!-- APP CONTAINER -->
  <div id="app" class="flex-grow flex flex-col">
    <!-- Navbar -->
    <header class="bg-indigo-900 text-white shadow-md">
      <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-3">
          <div class="bg-amber-500 p-2 rounded-lg text-indigo-950 font-bold text-xl tracking-wider">CAT</div>
          <div>
            <h1 class="font-extrabold text-lg leading-tight">ASN & STAN Portal</h1>
            <p class="text-xs text-indigo-200" id="status-koneksi">Simulasi Mandiri Berbasis Cloud
              Integration</p>
          </div>
        </div>
        <div class="flex items-center space-x-4" id="nav-user-profile">
          <!-- Dinamis via JS -->
        </div>
      </div>
    </header>

    <!-- Main Content Dynamic Area -->
    <main class="flex-grow max-w-7xl w-full mx-auto p-4 md:p-6" id="main-content">
      <!-- Konten Halaman akan di-render di sini -->
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-600  py-6 border-t border-slate-800 mt-auto">
      <div class="max-w-7xl mx-auto px-4 text-center text-sm">
        <p>&copy; 2026 CAT ASN/STAN Portal. Dikembangkan secara mandiri & 100% Gratis menggunakan Google Sheets
          Integration.</p>
        <p class="text-xs mt-1 text-slate-500">Gunakan Akun Demo di halaman login atau daftarkan akun baru Anda
          sendiri.</p>
      </div>
    </footer>
  </div>

  <!-- Custom Alert/Modal System -->
  <div id="custom-modal"
    class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
    <div
      class="bg-white rounded-2xl max-w-md w-full p-6 mx-4 shadow-2xl transform scale-95 transition-transform duration-300"
      id="modal-box">
      <div class="flex items-center space-x-3 mb-4">
        <div class="p-2 bg-amber-100 text-amber-700 rounded-full" id="modal-icon">
          <i class="fa-solid fa-triangle-exclamation text-xl"></i>
        </div>
        <h3 class="text-lg font-bold text-slate-900" id="modal-title">Perhatian</h3>
      </div>
      <p class="text-slate-600 text-sm mb-6" id="modal-message">Pesan notifikasi di sini.</p>
      <div class="flex justify-end space-x-3">
        <button id="modal-btn-cancel"
          class="px-4 py-2 text-sm font-semibold text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-lg hidden">Batal</button>
        <button id="modal-btn-ok"
          class="px-5 py-2 text-sm font-semibold bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition">OK</button>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // KONFIGURASI GOOGLE APPS SCRIPT
    // ==========================================
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyM63a9pG5DBkhY6ditZYgs60_d9tD5b4aintUrz_X1YXpX482Hn2nMh5BmtaUBQcpMhQ/exec";

    // Pastikan fungsi database bersifat GLOBAL (Hoisting)
    function getDB(key) {
      try {
        const data = localStorage.getItem(key);
        if (!data) return [];
        const parsed = JSON.parse(data);
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        console.error("Error getDB:", e);
        return [];
      }
    }

    function setDB(key, data) {
      try {
        localStorage.setItem(key, JSON.stringify(data));
      } catch (e) {
        console.error("Error setDB:", e);
      }
    }

    // Pasang ke window agar bisa dipanggil dari Console
    window.getDB = getDB;
    window.setDB = setDB;

    const KATEGORI_MAP = {
      "TWK": ["Nasionalisme", "Integritas", "Bela Negara", "Pilar Negara", "Bahasa Indonesia"],
      "TIU": ["Kemampuan Verbal", "Kemampuan Numerik", "Kemampuan Figural"],
      "TKP": ["Pelayanan Publik", "Jejaring Kerja", "Sosial Budaya", "Teknologi Informasi & Komunikasi", "Profesionalisme", "Anti-Radikalisme"]
    };

    const SUB_ABBR = {
      "Nasionalisme": "NASI", "Integritas": "INTE", "Bela Negara": "BELA", "Pilar Negara": "PILA", "Bahasa Indonesia": "BIND",
      "Kemampuan Verbal": "VERB", "Kemampuan Numerik": "NUME", "Kemampuan Figural": "FIGU",
      "Pelayanan Publik": "PUBL", "Jejaring Kerja": "JEJA", "Sosial Budaya": "SOBU", "Teknologi Informasi & Komunikasi": "TIKO", "Profesionalisme": "PROF", "Anti-Radikalisme": "RADI"
    };

    // --- DATA DEFAULT (CADANGAN) ---
    const DEFAULT_USERS = [{ id_user: "USR001", nama: "Admin", email: "super@cat.com", role: "super_admin", access_level: "premium", wilayah: "Jawa Barat", password: "password123" }];
    const DEFAULT_SOAL = [];
    const DEFAULT_TRYOUT = [];
    const DEFAULT_RIWAYAT = [];

    function initDatabase() {
      if (!localStorage.getItem('cat_users')) setDB('cat_users', DEFAULT_USERS);
      if (!localStorage.getItem('cat_soal')) setDB('cat_soal', DEFAULT_SOAL);
      if (!localStorage.getItem('cat_tryout')) setDB('cat_tryout', DEFAULT_TRYOUT);
      if (!localStorage.getItem('cat_riwayat')) setDB('cat_riwayat', DEFAULT_RIWAYAT);

      if (GAS_WEB_APP_URL) syncWithCloud();
    }
    async function saveTryoutToCloud(toData) {
      await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ action: 'save_tryout', data: toData })
      });
    }

    async function saveRiwayatToCloud(riwayatData) {
      await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ action: 'save_riwayat', data: riwayatData })
      });
    }
    async function syncWithCloud() {
      const statusEl = document.getElementById('status-koneksi');
      if (statusEl) statusEl.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i> Sinkronisasi Cloud...';

      try {
        const response = await fetch(GAS_WEB_APP_URL);
        const result = await response.json();

        if (result.status === 'success' && result.data) {
          // 1. SINKRON USER & VALIDASI EXPIRED
          if (result.data.users) {
            const now = new Date();
            const validatedUsers = result.data.users.map(u => {
              if (u.access_level === 'premium' && u.tanggal_habis) {
                if (now > new Date(u.tanggal_habis)) u.access_level = 'free';
              }
              return u;
            });
            setDB('cat_users', validatedUsers);
            if (currentUser) {
              const updatedMe = validatedUsers.find(u => u.id_user === currentUser.id_user);
              if (updatedMe) currentUser = updatedMe;
            }
          }

          // 2. SINKRON SOAL (PENTING!)
          if (result.data.soal) {
            const cleanedSoal = result.data.soal.map(s => {
              if (typeof s.bobot_nilai === 'string') {
                try { s.bobot_nilai = JSON.parse(s.bobot_nilai); }
                catch (e) { s.bobot_nilai = { "A": 0, "B": 0, "C": 5, "D": 0, "E": 0 }; }
              }
              s.pembahasan = s.pembahasan || s.penjelasan || "Tidak ada pembahasan.";
              return s;
            });
            setDB('cat_soal', cleanedSoal);
          }

          // 3. SINKRON TRYOUT & RIWAYAT
          if (result.data.tryout) setDB('cat_tryout', result.data.tryout);
          if (result.data.riwayat) setDB('cat_riwayat', result.data.riwayat);

          if (statusEl) statusEl.innerHTML = '<i class="fa-solid fa-cloud-check text-emerald-400 mr-1"></i> Cloud Active';
          if (activePage === 'dashboard_peserta') renderDashboardPeserta();
        }
      } catch (err) {
        if (statusEl) statusEl.innerHTML = '<i class="fa-solid fa-cloud-arrow-down text-rose-400 mr-1"></i> Mode Offline';
      }
    }
    async function registerToCloud(userData) {
      try {
        await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ action: 'register_user', data: userData })
        });
        return true;
      } catch (e) { return false; }
    }

    async function saveSoalToCloud(soalData) {
      try {
        await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ action: 'save_soal', data: soalData })
        });
        // Picu sync ulang agar data terbaru masuk
        setTimeout(syncWithCloud, 1000);
      } catch (e) { console.error(e); }
    }

    // Variabel Global
    let currentUser = null;
    let activePage = 'login';
    let testSession = null;
    let activeChart = null;
    let currentDrilldownCategory = null;
    let editingSoalId = null;
    let activeAdminTab = null;
    let currentPageKelola = 1;
    const itemsPerPageKelola = 20;
    let currentFilterKat = 'ALL';
    let currentFilterSub = 'ALL';
    let kelolaChart = null;
    let currentKelolaDrilldown = null;
    let activeSubFocus = null;
    let userSearchTerm = "";
    let userFilterRole = "ALL";
    let userSortBy = "id_desc";
    let userSearchTimer; // Timer untuk jeda mengetik

    function showModal(title, message, iconType = 'warning', showCancel = false, onOk = null) {
      const modal = document.getElementById('custom-modal');
      const titleEl = document.getElementById('modal-title');
      const msgEl = document.getElementById('modal-message');
      const iconEl = document.getElementById('modal-icon');
      const btnCancel = document.getElementById('modal-btn-cancel');
      const btnOk = document.getElementById('modal-btn-ok');

      if (!modal || !titleEl || !msgEl || !iconEl || !btnCancel || !btnOk) return;

      titleEl.innerText = title;
      msgEl.innerText = message;

      if (iconType === 'success') {
        iconEl.className = "p-2 bg-emerald-100 text-emerald-700 rounded-full";
        iconEl.innerHTML = `<i class="fa-solid fa-circle-check text-xl"></i>`;
      } else if (iconType === 'error') {
        iconEl.className = "p-2 bg-rose-100 text-rose-700 rounded-full";
        iconEl.innerHTML = `<i class="fa-solid fa-circle-xmark text-xl"></i>`;
      } else {
        iconEl.className = "p-2 bg-amber-100 text-amber-700 rounded-full";
        iconEl.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-xl"></i>`;
      }

      if (showCancel) {
        btnCancel.classList.remove('hidden');
      } else {
        btnCancel.classList.add('hidden');
      }

      modal.classList.remove('hidden');
      setTimeout(() => modal.classList.add('opacity-100'), 10);

      const newBtnOk = btnOk.cloneNode(true);
      if (btnOk.parentNode) btnOk.parentNode.replaceChild(newBtnOk, btnOk);
      const newBtnCancel = btnCancel.cloneNode(true);
      if (btnCancel.parentNode) btnCancel.parentNode.replaceChild(newBtnCancel, btnCancel);

      newBtnOk.addEventListener('click', () => {
        closeModal();
        if (onOk) onOk();
      });

      newBtnCancel.addEventListener('click', closeModal);
    }

    function closeModal() {
      const modal = document.getElementById('custom-modal');
      if (modal) {
        modal.classList.remove('opacity-100');
        setTimeout(() => modal.classList.add('hidden'), 300);
      }
    }

    function updateHeader() {
      const container = document.getElementById('nav-user-profile');
      if (!container) return;

      if (!currentUser) {
        container.innerHTML = `
          <button onclick="navigate('login')" class="text-sm font-semibold hover:text-indigo-200 mr-2">Masuk</button>
          <button onclick="navigate('register')" class="text-sm font-semibold bg-amber-500 text-indigo-950 px-3 py-1.5 rounded-lg hover:bg-amber-400 transition">Daftar</button>
        `;
      } else {
        let badgeColor = "bg-slate-700";
        if (currentUser.role === 'super_admin') badgeColor = "bg-rose-600";
        if (currentUser.role === 'admin_input') badgeColor = "bg-blue-600";
        if (currentUser.role === 'admin_reviewer') badgeColor = "bg-amber-600";
        if (currentUser.role === 'peserta') badgeColor = "bg-emerald-600";

        container.innerHTML = `
          <div class="flex items-center space-x-3">
            <div class="text-right hidden sm:block">
              <p class="font-bold text-sm leading-tight">${currentUser.nama}</p>
              <div class="flex items-center space-x-2 justify-end">
                <span class="text-[10px] ${badgeColor} text-white px-2 py-0.5 rounded font-mono uppercase tracking-wider">${currentUser.role.replace('_', ' ')}</span>
                ${currentUser.role === 'peserta' ? `
                  <span class="text-[10px] bg-indigo-700 text-indigo-100 px-1.5 py-0.5 rounded font-bold">${(currentUser.access_level || 'FREE').toUpperCase()}</span>
                ` : ''}
              </div>
            </div>
            <button onclick="handleLogout()" class="p-2 hover:bg-indigo-950 rounded-full text-indigo-200 hover:text-white transition" title="Keluar">
              <i class="fa-solid fa-right-from-bracket text-lg"></i>
            </button>
          </div>
        `;
      }
    }

    function navigate(page) {
      activePage = page;
      updateHeader();

      // Simple Router Guard
      if (page !== 'login' && page !== 'register' && !currentUser) {
        activePage = 'login';
        renderLogin();
        return;
      }

      if (page === 'login') renderLogin();
      else if (page === 'register') renderRegister();
      else if (page === 'dashboard_peserta') renderDashboardPeserta();
      else if (page === 'dashboard_admin') renderDashboardAdmin();
      else if (page === 'ujian') renderUjian();
      else if (page === 'review_ujian') renderReviewUjian();
    }

    function handleLogout() {
      currentUser = null;
      testSession = null;
      activeAdminTab = null; // TAMBAHKAN INI agar tab kembali ke awal saat ganti user
      navigate('login');
    }

    function renderLogin() {
      const main = document.getElementById('main-content');
      if (!main) return;
      main.innerHTML = `
        <div class="max-w-md mx-auto my-12 bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
          <div class="bg-indigo-900 px-6 py-8 text-white text-center">
            <div class="inline-block bg-amber-500 text-indigo-950 p-3 rounded-2xl font-black text-2xl mb-3 shadow">CAT</div>
            <h2 class="text-xl font-bold">Selamat Datang</h2>
            <p class="text-xs text-indigo-200 mt-1">Sistem CAT ASN & STAN Berbasis Cloud Integration</p>
          </div>
          
          <div class="p-6 space-y-4">
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Gunakan Akun Demo Untuk Menguji:</label>
              <div class="grid grid-cols-2 gap-2 mt-2">
                <button onclick="autologin('super@cat.com')" class="text-left p-2.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-xl transition text-xs">
                  <strong class="block text-slate-700"><i class="fa-solid fa-user-shield text-rose-500 mr-1"></i> Super Admin</strong>
                  <span class="text-slate-500">super@cat.com</span>
                </button>
                <button onclick="autologin('editor@cat.com')" class="text-left p-2.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-xl transition text-xs">
                  <strong class="block text-slate-700"><i class="fa-solid fa-pen-nib text-blue-500 mr-1"></i> Admin Input</strong>
                  <span class="text-slate-500">editor@cat.com</span>
                </button>
                <button onclick="autologin('reviewer@cat.com')" class="text-left p-2.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-xl transition text-xs">
                  <strong class="block text-slate-700"><i class="fa-solid fa-clipboard-check text-amber-500 mr-1"></i> Reviewer</strong>
                  <span class="text-slate-500">reviewer@cat.com</span>
                </button>
                <button onclick="autologin('rian@gmail.com')" class="text-left p-2.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-xl transition text-xs">
                  <strong class="block text-slate-700"><i class="fa-solid fa-graduation-cap text-emerald-500 mr-1"></i> Peserta Premium</strong>
                  <span class="text-slate-500">rian@gmail.com</span>
                </button>
              </div>
            </div>

            <div class="relative flex py-2 items-center">
              <div class="flex-grow border-t border-slate-200"></div>
              <span class="flex-shrink mx-4 text-slate-600  text-xs uppercase">Atau Masuk Manual</span>
              <div class="flex-grow border-t border-slate-200"></div>
            </div>

            <form id="login-form" class="space-y-4">
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Email</label>
                <div class="relative">
                  <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-600 ">
                    <i class="fa-regular fa-envelope"></i>
                  </span>
                  <input type="email" id="login-email" required class="w-full pl-9 pr-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm transition" placeholder="nama@email.com">
                </div>
              </div>

              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Kata Sandi</label>
                <div class="relative">
                  <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-600 ">
                    <i class="fa-solid fa-lock"></i>
                  </span>
                  <input type="password" id="login-password" required class="w-full pl-9 pr-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm transition" placeholder="••••••••">
                </div>
              </div>

              <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl transition shadow-lg shadow-indigo-100">
                Masuk ke Dashboard
              </button>
            </form>

            <div class="mt-4 pt-4 border-t border-slate-100 text-center text-sm">
              <span class="text-slate-500">Belum punya akun?</span> 
              <button onclick="navigate('register')" class="text-indigo-600 font-bold hover:underline">Daftar sekarang</button>
            </div>
          </div>
        </div>
      `;

      const form = document.getElementById('login-form');
      if (form) {
        form.addEventListener('submit', function (e) {
          e.preventDefault();
          const emailInput = document.getElementById('login-email');
          const passwordInput = document.getElementById('login-password');
          const email = emailInput ? emailInput.value : '';
          const password = passwordInput ? passwordInput.value : '';
          autologin(email, password);
        });
      }
    }

    // ==========================================
    // HALAMAN REGISTRASI BARU
    // ==========================================
    function renderRegister() {
      const main = document.getElementById('main-content');
      if (!main) return;
      main.innerHTML = `
        <div class="max-w-md mx-auto my-6 bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
          <div class="bg-indigo-900 px-6 py-6 text-white text-center">
            <h2 class="text-xl font-bold"><i class="fa-solid fa-user-plus mr-2 text-amber-400"></i>Pendaftaran Akun Baru</h2>
            <p class="text-xs text-indigo-200 mt-1">Buat akun untuk memulai simulasi mandiri</p>
          </div>
          
          <div class="p-6 space-y-4">
            <form id="register-form" class="space-y-4">
              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Nama Lengkap</label>
                <div class="relative">
                  <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-600 "><i class="fa-regular fa-user"></i></span>
                  <input type="text" id="reg-nama" required class="w-full pl-9 pr-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm transition" placeholder="Mis: Ahmad Budi">
                </div>
              </div>

              <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Email Aktif</label>

    async function handleRegistration(e) {
      e.preventDefault();

      const btn = document.getElementById('btn-submit-reg');
      if (btn) {
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Memproses...';
        btn.disabled = true;
      }

      const email = document.getElementById('reg-email').value;
      const users = getDB('cat_users') || [];

      // 1. CEK EMAIL DUPLIKAT
      if (users.find(u => u && u.email && u.email.toLowerCase() === email.toLowerCase())) {
        showModal("Pendaftaran Gagal", "Email ini sudah terdaftar.", "error");
        if (btn) { btn.innerHTML = 'Daftar Sekarang'; btn.disabled = false; }
        return;
      }

      // 2. LOGIKA ID BARU (Cari angka tertinggi lalu + 1)
      let nextIdNum = 1;
      if (users.length > 0) {
        // Ambil semua ID, buang tulisan "USR", ubah jadi angka, cari yang paling besar
        const allIds = users.map(u => {
          const idStr = u.id_user ? u.id_user.toString().replace("USR", "") : "0";
          return parseInt(idStr) || 0;
        });
        nextIdNum = Math.max(...allIds) + 1;
      }
      const nextId = "USR" + String(nextIdNum).padStart(3, '0'); // Hasilnya USR001, USR002, dst.

      // 3. DATA USER BARU
      const newUser = {
        id_user: nextId,
        nama: document.getElementById('reg-nama').value,
        email: email,
        password: document.getElementById('reg-password').value,
        role: "peserta",
        access_level: "free",
        wilayah: document.getElementById('reg-wilayah').value
      };

      // 4. SIMPAN LOKAL & CLOUD
      users.push(newUser);
      setDB('cat_users', users);

      const cloudSuccess = await registerToCloud(newUser);

      if (cloudSuccess) {
        showModal("Pendaftaran Berhasil!", `ID Anda: ${nextId}. Silakan masuk.`, "success", false, () => {
          navigate('login');
        });
      } else {
        showModal("Registrasi Sukses (Lokal)", "Cloud offline, data akan disinkronkan nanti.", "warning", false, () => {
          navigate('login');
        });
      }
    }
    async function autologin(email, password = '') {
      // 1. Coba sync dulu sebentar sebelum masuk (Opsional tapi direkomendasikan)
      await syncWithCloud();

      const users = getDB('cat_users') || [];
      const user = users.find(u => u && u.email && u.email.toLowerCase() === email.toLowerCase());

      if (user) {
        const requiredPass = user.password || "password123";
        if (password && password !== requiredPass) {
          showModal("Gagal Masuk", "Kata sandi salah.", "error");
          return;
        }

        currentUser = user;

        // 2. Cek status premium tepat sebelum masuk dashboard
        if (user.access_level === 'premium' && user.tanggal_habis) {
          const expiry = new Date(user.tanggal_habis);
          if (new Date() > expiry) {
            user.access_level = 'free';
            showModal("Info Langganan", "Masa aktif Premium Anda telah habis. Akun kembali ke Reguler.", "info");
          }
        }

        if (user.role === 'peserta') navigate('dashboard_peserta');
        else navigate('dashboard_admin');
      } else {
        showModal("Gagal Masuk", "User tidak ditemukan di database cloud.", "error");
      }

      const users = getDB('cat_users') || [];

          access_level: 'premium',

          temp_channel: channel
        };

        try {
          showModal("Memproses", "Mengaktifkan Premium (Masa Aktif 3 Bulan)...", "info");
          await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ action: 'update_user', data: userToUpdate })
          });

          // Refresh data dari cloud untuk mendapatkan tanggal_habis yang dihitung server
          await syncWithCloud();

          closeModal();
          showModal("Sukses!", "Akun Anda kini PREMIUM selama 3 bulan kedepan.", "success", false, () => {

      const mat = matEl.value;
      const subCategories = KATEGORI_MAP[mat] || [];

      // Reset dan tambahkan opsi default
      subSelect.innerHTML = `<option value="ALL">Semua Sub Kategori (Default)</option>`;

      // Tambahkan semua sub-kategori dari map
      subCategories.forEach(sub => {
        const isDisabled = !isPremium;
        const lockIcon = isDisabled ? ' 🔒' : '';

        // Kita buat elemen option secara manual agar aman
        const opt = document.createElement('option');
        opt.value = sub;
        opt.innerText = sub + lockIcon;
        if (isDisabled) opt.disabled = true;

        subSelect.appendChild(opt);
      });

    // ==========================================
    // UPDATE: ANALYTICS CHART DENGAN LOGIKA REKOMENDASI SUB-KATEGORI
    // ==========================================


    // ==========================================
    // UPDATE: SHOW HISTORY SALAH (Dibatasi 10)
    // ==========================================
    function renderAnalyticsChart() {
      if (typeof Chart === 'undefined') return;

      const allRiwayat = (getDB('cat_riwayat') || []).filter(r => r && r.id_user === currentUser.id_user);
      const allSoal = (getDB('cat_soal') || []).filter(s => s && s.status_review === 'published');
      const canvas = document.getElementById('analyticsChart');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');

      // 1. Hitung Data Skor
      let datasets = { "TWK": { benar: 0, total: 0 }, "TIU": { benar: 0, total: 0 }, "TKP": { benar: 0, total: 0 } };
      let subDatasets = {};

      allRiwayat.forEach(rw => {
        const jawabanPeserta = rw.jawaban_peserta || {};
        for (const [id_soal, jwb] of Object.entries(jawabanPeserta)) {
          const soal = allSoal.find(s => s && s.id_soal === id_soal);
          if (soal) {
            const kat = soal.kategori;
            const subKat = soal.sub_kategori;
            const bobotMax = 5;
            const skorDapat = (soal.bobot_nilai && soal.bobot_nilai[jwb]) || 0;

            if (datasets[kat]) {
              datasets[kat].total += bobotMax;
              datasets[kat].benar += skorDapat;
            }
            if (!subDatasets[kat]) subDatasets[kat] = {};
            if (!subDatasets[kat][subKat]) subDatasets[kat][subKat] = { benar: 0, total: 0 };
            subDatasets[kat][subKat].total += bobotMax;
            subDatasets[kat][subKat].benar += skorDapat;
          }
        }
      });

      // 2. Tentukan Label & Value
      let labels = [];
      let dataValues = [];
      const resetBtn = document.getElementById('btn-chart-reset');

      if (!currentDrilldownCategory) {
        if (resetBtn) resetBtn.classList.add('hidden');
        labels = ["TWK", "TIU", "TKP"];
        dataValues = labels.map(l => datasets[l].total > 0 ? Math.round((datasets[l].benar / datasets[l].total) * 100) : 0);
      } else {
        if (resetBtn) resetBtn.classList.remove('hidden');
        labels = KATEGORI_MAP[currentDrilldownCategory] || [];
        dataValues = labels.map(sub => {
          const val = subDatasets[currentDrilldownCategory]?.[sub];
          return (val && val.total > 0) ? Math.round((val.benar / val.total) * 100) : 0;
        });
      }

      // 3. Render Chart
      if (activeChart) activeChart.destroy();
      activeChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            data: dataValues,
            backgroundColor: currentDrilldownCategory ? 'rgba(245, 158, 11, 0.4)' : 'rgba(79, 70, 229, 0.4)',
            borderColor: currentDrilldownCategory ? '#f59e0b' : '#4f46e5',
            borderWidth: 2, borderRadius: 6
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          onClick: (e, elements) => {
            if (elements && elements.length > 0) {
              const idx = elements[0].index;
              const labelClicked = labels[idx];

              if (!currentDrilldownCategory) {
                // Masuk ke drilldown
                currentDrilldownCategory = labelClicked;
                activeSubFocus = null; // reset focus saat ganti kategori utama
              } else {
                // Klik pada bar sub-kategori
                activeSubFocus = labelClicked;
              }
              renderAnalyticsChart();
            }
          },
          scales: { y: { beginAtZero: true, max: 100 } },
          plugins: { legend: { display: false } }
        }
      });

      // 4. LOGIKA EVALUASI BERDASARKAN KLIK
      const rekEl = document.getElementById('rekomendasi-belajar');
      if (rekEl) {
        let targetLabel, targetScore;

        // PRIORITAS: 
        // 1. Apa yang baru saja diklik user (activeSubFocus)
        // 2. Jika belum ada yang diklik, cari yang terendah (minVal)
        if (activeSubFocus && labels.includes(activeSubFocus)) {
          targetLabel = activeSubFocus;
          targetScore = dataValues[labels.indexOf(activeSubFocus)];
        } else {
          const minVal = Math.min(...dataValues);
          targetLabel = labels[dataValues.indexOf(minVal)];
          targetScore = minVal;
        }

        if (targetScore < 65) {
          rekEl.innerHTML = `
                <div class="bg-amber-50 rounded-2xl p-5 border border-amber-200 shadow-sm animate-scale-up">
                    <div class="flex items-center space-x-2 mb-2">
                        <div class="bg-amber-500 text-white p-1.5 rounded-lg text-[10px]">
                            <i class="fa-solid fa-triangle-exclamation"></i>
                        </div>
                        <h4 class="text-sm font-bold text-amber-800">Evaluasi: ${targetLabel}</h4>
                    </div>
                    <p class="text-[11px] text-amber-700 leading-relaxed mb-4">
                        Akurasi Anda pada materi <strong>${targetLabel}</strong> adalah <strong>${targetScore}%</strong>. Materi ini memerlukan perhatian lebih.
                    </p>
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="showHistorySalah('${targetLabel}')" class="w-full bg-amber-600 hover:bg-amber-700 text-white text-[11px] font-bold py-2.5 rounded-xl transition flex items-center justify-center space-x-2 shadow-md">
                            <i class="fa-solid fa-clock-rotate-left"></i>
                            <span>Ulas 10 Kesalahan di ${targetLabel}</span>
                        </button>
                        <button onclick="fokusLatihanMandiri('${currentDrilldownCategory || targetLabel}', '${currentDrilldownCategory ? targetLabel : 'ALL'}')" class="w-full bg-white border border-amber-300 text-amber-700 text-[11px] font-bold py-2.5 rounded-xl hover:bg-amber-50 transition">
                            Latihan Mandiri: ${targetLabel}
                        </button>
                    </div>
                </div>
            `;
        } else {
          rekEl.innerHTML = `
                <div class="bg-emerald-50 rounded-2xl p-5 border border-emerald-200 shadow-sm animate-scale-up">
                    <div class="flex items-center space-x-2 mb-2">
                        <div class="bg-emerald-500 text-white p-1.5 rounded-lg text-[10px]">
                            <i class="fa-solid fa-circle-check"></i>
                        </div>
                        <h4 class="text-sm font-bold text-emerald-800">Hasil Evaluasi: ${targetLabel}</h4>
                    </div>
                    <p class="text-[11px] text-emerald-700 leading-relaxed">
                        Selamat! Akurasi Anda pada materi <strong>${targetLabel}</strong> sudah mencapai <strong>${targetScore}%</strong>. Ini sudah melampaui ambang batas minimal 65%.
                    </p>
                </div>
            `;
        }
      }
    }

    function showHistorySalah(materi) {
      console.log("Membuka ulasan untuk:", materi); // Debugging

      // 1. Ambil Data Terbaru
      const allRiwayat = getDB('cat_riwayat') || [];
      const allSoal = getDB('cat_soal') || [];
      const myRiwayat = allRiwayat.filter(r => r && r.id_user === currentUser.id_user);

      let listKesalahan = [];

      // 2. Cari Kesalahan
      myRiwayat.forEach(entry => {
        const jawabanUser = entry.jawaban_peserta || {};

        for (const [idSoal, jwb] of Object.entries(jawabanUser)) {
          // Cari data soal asli berdasarkan ID
          const soal = allSoal.find(s => s && s.id_soal === idSoal);

          if (soal) {
            // Cek apakah soal ini termasuk dalam materi yang dicari (Kategori atau Sub-Kategori)
            const isMatch = (soal.sub_kategori === materi || soal.kategori === materi);

            if (isMatch) {
              const bobot = soal.bobot_nilai || {};
              const poinDapat = bobot[jwb] || 0;

              // Cari poin maksimal yang mungkin didapat di soal tersebut
              const poinMax = Math.max(...Object.values(bobot).map(v => parseInt(v) || 0));

              // Jika poin yang didapat < poin maksimal, berarti "Salah" atau "Kurang Tepat"
              if (poinDapat < poinMax) {
                listKesalahan.push({
                  soal: soal,
                  jawabanUser: jwb,
                  poinDapat: poinDapat,
                  poinMax: poinMax,
                  tanggal: entry.waktu_selesai
                });
              }
            }
          }
        }
      });

      // 3. Urutkan dari yang paling baru dan ambil 10 saja
      listKesalahan.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));
      const finalDisplay = listKesalahan.slice(0, 10);

      // 4. Render Overlay Modal

      const oldOverlay = document.getElementById('overlay-salah');

                ${finalDisplay.length === 0 ? `

        const s = item.soal;

      // Reset semua tombol ke tampilan tidak aktif
      const buttons = document.querySelectorAll('[id^="tab-btn-"]');
      buttons.forEach(btn => {
        btn.classList.remove('border-indigo-600', 'text-indigo-600', 'bg-white');
        btn.classList.add('border-transparent', 'text-slate-500');

      const activeBtn = document.getElementById(`tab-btn-${tab}`);
      if (activeBtn) {
        activeBtn.classList.remove('border-transparent', 'text-slate-500');
        activeBtn.classList.add('border-indigo-600', 'text-indigo-600', 'bg-white');

      if (tab === 'draft') renderPanelDraft(panel);

    async function approveSoal(id_soal) {
      const list = getDB('cat_soal') || [];
      const idx = list.findIndex(s => s && s.id_soal === id_soal);

      if (idx !== -1) {
        // 1. Update status di lokal
        list[idx].status_review = 'published';
        list[idx].reviewed_by = currentUser ? currentUser.id_user : 'SYSTEM';
        setDB('cat_soal', list);

        // 2. Kirim update ke Cloud (Google Sheets)
        showModal("Memproses", "Sedang mempublikasikan soal ke database cloud...", "info");

        try {
          await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
              action: 'save_soal',
              data: list[idx]
            })
          });

          // Beri jeda sebentar lalu tarik data terbaru
          setTimeout(async () => {
            await syncWithCloud();
            showModal("Sukses Publish", "Soal saat ini telah aktif di simulator peserta.", "success");
            renderDashboardAdmin();
          }, 1000);

        } catch (e) {
          console.error("Gagal kirim ke cloud:", e);
          showModal("Gagal", "Koneksi internet bermasalah, namun status lokal sudah berubah.", "error");
        }
      }
    }

        const isTKP = (kat === 'TKP');

        ['A', 'B', 'C', 'D', 'E'].forEach(opt => {

    function renderKelolaCompositionChart(data) {
      const canvas = document.getElementById('chartKomposisiSoal');
      if (!canvas || typeof Chart === 'undefined') return;

      const ctx = canvas.getContext('2d');
      if (kelolaChart) kelolaChart.destroy();

      if (!currentKelolaDrilldown) {
        // --- MODE 1: DOUGHNUT CHART (KATEGORI UTAMA) ---
        const counts = { TWK: 0, TIU: 0, TKP: 0 };
        data.forEach(s => { if (counts[s.kategori] !== undefined) counts[s.kategori]++; });

        kelolaChart = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: ['TWK', 'TIU', 'TKP'],
            datasets: [{
              data: [counts.TWK, counts.TIU, counts.TKP],
              backgroundColor: ['#4f46e5', '#10b981', '#f59e0b'],
              borderWidth: 0
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: {
              padding: {
                bottom: 0 // Memaksa padding bawah nol
              }
            }, onClick: (e, elements) => {
              if (elements.length > 0) {
                const idx = elements[0].index;
                const label = ['TWK', 'TIU', 'TKP'][idx];
                currentKelolaDrilldown = label;
                // Render ulang panel untuk memicu perubahan chart & tombol back
                renderPanelKelola(document.getElementById('admin-panel-content'));
              }
            },
            plugins: {
              legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } }
            },
            cutout: '70%'
          }
        });
      } else {
        // --- MODE 2: HORIZONTAL BAR CHART (SUB-KATEGORI) ---
        const subCounts = {};
        // Ambil daftar standar sub-kategori untuk kategori ini agar tetap muncul meski 0
        const standardSubs = KATEGORI_MAP[currentKelolaDrilldown] || [];
        standardSubs.forEach(sub => subCounts[sub] = 0);

        // Hitung soal yang ada
        data.filter(s => s.kategori === currentKelolaDrilldown).forEach(s => {
          if (subCounts[s.sub_kategori] !== undefined) subCounts[s.sub_kategori]++;
          else subCounts[s.sub_kategori] = 1;
        });

        const labels = Object.keys(subCounts);
        const values = Object.values(subCounts);

        kelolaChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: 'Jumlah Soal',
              data: values,
              backgroundColor: currentKelolaDrilldown === 'TWK' ? '#4f46e5' :
                (currentKelolaDrilldown === 'TIU' ? '#10b981' : '#f59e0b'),
              borderRadius: 4
            }]
          },
          options: {
            indexAxis: 'y', // Membuat chart jadi horizontal
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 9 } } },
              y: { ticks: { font: { size: 9 } } }
            },
            plugins: {
              legend: { display: false }
            }
          }
        });
      }
    }

    function autoGenerateCAT() {
      const rawSoal = getDB('cat_soal') || [];

      // Pisahkan per kategori
      const twkPool = publishedSoal.filter(s => s.kategori === 'TWK').sort(() => 0.5 - Math.random());
      const tiuPool = publishedSoal.filter(s => s.kategori === 'TIU').sort(() => 0.5 - Math.random());
      const tkpPool = publishedSoal.filter(s => s.kategori === 'TKP').sort(() => 0.5 - Math.random());

      // Standar ASN: 30 TWK, 35 TIU, 45 TKP
      const selectedTWK = twkPool.slice(0, 30);
      const selectedTIU = tiuPool.slice(0, 35);
      const selectedTKP = tkpPool.slice(0, 45);

      const totalSelected = [...selectedTWK, ...selectedTIU, ...selectedTKP];

      if (totalSelected.length === 0) {
        showModal("Gagal", "Tidak ada soal yang tersedia untuk diacak.", "error");
        return;
      }

                      <select onchange="updateUserField('${u.id_user}', 'role', this.value)" ${isSelf ? 'disabled' : ''} class="border border-slate-200 rounded p-1 text-[11px] bg-transparent">
                        <option value="super_admin" ${u.role === 'super_admin' ? 'selected' : ''}>Super Admin</option>
                        <option value="admin_input" ${u.role === 'admin_input' ? 'selected' : ''}>Admin Input</option>
                        <option value="admin_reviewer" ${u.role === 'admin_reviewer' ? 'selected' : ''}>Reviewer</option>
                        <option value="peserta" ${u.role === 'peserta' ? 'selected' : ''}>Peserta</option>
                      </select>
                    </td>
                    <td class="p-3">
                      ${isPeserta ? `
                        <select onchange="updateStatusManual('${u.id_user}', this.value)" class="border border-slate-300 rounded p-1.5 text-[11px] font-bold ${u.access_level === 'premium' ? 'bg-amber-50 text-amber-700' : ''}">
                          <option value="free" ${u.access_level === 'free' ? 'selected' : ''}>BELUM BAYAR</option>
                          <option value="premium" ${u.access_level === 'premium' ? 'selected' : ''}>AKTIF PREMIUM</option>
                        </select>
                      ` : '<span class="text-slate-300 italic">Staff Account</span>'}
                    </td>
                    <td class="p-3 text-center">
                      <div class="flex flex-col items-center">
                        <span class="text-[10px] mb-1">${sisaTeks}</span>
                        ${isSelf ? '<span class="text-[9px] font-bold text-indigo-500">YOU</span>' : `
                          <button onclick="hapusUser('${u.id_user}')" class="text-rose-400 hover:text-rose-600"><i class="fa-regular fa-trash-can"></i></button>
                        `}
                      </div>
                    </td>
                  </tr>`;
      }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
      const searchInput = document.getElementById('user-search-input');
      if (searchInput && userSearchTerm !== "") {
        searchInput.focus();
        // Pindahkan kursor ke akhir huruf
        const val = searchInput.value;
        searchInput.value = '';
        searchInput.value = val;
      }

      // --- 4. PASANG ULANG LISTENER FORM (PENTING!) ---
      setupStafFormListener();
    }

    function setupStafFormListener() {
      const form = document.getElementById('form-staf-baru');
      if (!form) return;

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        const users = getDB('cat_users') || [];
        const email = document.getElementById('staf-email').value;

        if (users.find(u => u.email === email)) {
          showModal("Gagal", "Email sudah terdaftar.", "error");
          return;
        }

        // Logika ID Tertinggi + 1
        let nextIdNum = 1;
        if (users.length > 0) {
          const allIds = users.map(u => parseInt(u.id_user.replace("USR", "")) || 0);
          nextIdNum = Math.max(...allIds) + 1;
        }
        const nextId = "USR" + String(nextIdNum).padStart(3, '0');

        const newU = {
          id_user: nextId,
          nama: document.getElementById('staf-nama').value,
          email: email,
          password: "password123",
          role: document.getElementById('staf-role').value,
          access_level: "free",
          wilayah: "Pusat",
          tanggal_daftar: new Date().toISOString()
        };

        users.push(newU);
        setDB('cat_users', users);

        // Kirim ke cloud
        await registerToCloud(newU);

        showModal("Berhasil", `Staf ${newU.nama} ditambahkan dengan ID ${nextId}. Password default: password123`, "success");

        // Refresh Tampilan
        const panel = document.getElementById('admin-panel-content');
        if (panel) renderPanelUsers(panel);
      });
    }
    function updateUserFilter(type, value) {
      if (type === 'search') userSearchTerm = value;
      if (type === 'role') userFilterRole = value;
      if (type === 'sort') userSortBy = value;

      // Render ulang panel tanpa pindah halaman
      const panel = document.getElementById('admin-panel-content');
      if (panel) renderPanelUsers(panel);
    }
    function hapusUser(id) {
      showModal("Hapus Staf?", "Yakin ingin mencabut hak akses staf?", "warning", true, () => {
        const list = getDB('cat_users') || [];
        const filtered = list.filter(u => u && u.id_user !== id);
        setDB('cat_users', filtered);
        showModal("Sukses", "Akses staf dihapus.", "success");
        renderDashboardAdmin();
      });
    }
    function updateUserField(userId, field, value) {
      const users = getDB('cat_users') || [];
      const idx = users.findIndex(u => u.id_user === userId);

      if (idx !== -1) {
        users[idx][field] = value;
        if (field === 'role' && value !== 'peserta') {
          users[idx].access_level = 'free';
        }
        setDB('cat_users', users);

        // Karena kita sudah menyimpan activeAdminTab = 'users', 
        // pemanggilan ini tidak akan memindahkankan Anda ke tab lain.
        renderDashboardAdmin();
      }
    }
    async function updateStatusManual(userId, newLevel) {
      const msg = newLevel === 'premium'
        ? "Aktifkan status Premium untuk user ini selama 3 bulan?"
        : "Batalkan status Premium dan kembalikan ke akun Reguler?";

      showModal("Konfirmasi Akses", msg, "warning", true, async () => {
        const users = getDB('cat_users');
        const u = users.find(x => x.id_user === userId);

        if (u) {
          u.access_level = newLevel;
          // Jika dibatalkan, kita kosongkan tanggal habis secara lokal dulu
          if (newLevel === 'free') u.tanggal_habis = "";

          setDB('cat_users', users);

          try {
            await fetch(GAS_WEB_APP_URL, {
              method: 'POST',
              mode: 'no-cors',
              body: JSON.stringify({ action: 'update_user', data: u })
            });

            showModal("Berhasil", "Status user telah diperbarui.", "success");
            // Tarik data terbaru untuk memastikan tanggal sinkron
            syncWithCloud();
          } catch (e) {
            console.error(e);
          }
        }
      });
    }
    function startTryout(id) {
      const allTryouts = getDB('cat_tryout') || [];
      const to = allTryouts.find(t => t && t.id_tryout === id);
      if (!to) return;

      const sekarang = new Date();
      if (to.waktu_mulai && sekarang < new Date(to.waktu_mulai)) {
        showModal("Belum Dibuka", "Ujian ini terjadwal mulai: " + new Date(to.waktu_mulai).toLocaleString(), "warning");
        return;
      }
      if (to.waktu_selesai && sekarang > new Date(to.waktu_selesai)) {
        showModal("Sudah Tutup", "Maaf, masa pengerjaan Try Out ini sudah berakhir.", "error");
        return;
      }

      const allSoal = (getDB('cat_soal') || []).filter(s => s && s.status_review === 'published');
      const list = to.daftar_id_soal ? to.daftar_id_soal.map(sid => allSoal.find(s => s && s.id_soal === sid)).filter(Boolean) : [];

      if (list.length === 0) {
        showModal("Gagal", "Soal tidak ditemukan. Pastikan status soal sudah 'published'.", "error");
        return;
      }
      setupExamSession('tryout', to.id_tryout, to.judul_tryout, list, to.durasi_menit);
    }
    function setupExamSession(type, toId, title, listSoal, durasiM, katLat = "") {
      testSession = {
        tipe_aktivitas: type,
        id_tryout: toId,
        judul_ujian: title,
        kategori_latihan: katLat,
        soal: listSoal,
        jawaban: {},
        index_aktif: 0,
        detik_tersisa: (durasiM || 15) * 60,
        waktu_mulai: new Date().toISOString()
      };

      navigate('ujian');
      startExamTimer();
    }

    let timerInterval = null;
    function startExamTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (!testSession || activePage !== 'ujian') {
          clearInterval(timerInterval);
          return;
        }

        testSession.detik_tersisa--;

        const m = Math.floor(testSession.detik_tersisa / 60);
        const s = testSession.detik_tersisa % 60;
        const formatted = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

        const timerEl = document.getElementById('exam-timer');
        if (timerEl) {
          timerEl.innerText = formatted;
          if (testSession.detik_tersisa <= 60) {
            timerEl.className = "text-xl font-mono font-black text-rose-500 animate-pulse";
          }
        }

        if (testSession.detik_tersisa <= 0) {
          clearInterval(timerInterval);
          finishUjianAuto();
        }
      }, 1000);
    }

function renderUjian() {
  const main = document.getElementById('main-content');
  if (!testSession || !main) return;

  const activeIdx = testSession.index_aktif;
  const totalSoal = testSession.soal.length;
  const soalAktif = testSession.soal[activeIdx];
  if (!soalAktif) return;

  const jwbDipilih = testSession.jawaban[soalAktif.id_soal] || null;

  // Tema warna per kategori
  const config = {
    "TWK": { color: "indigo", bg: "bg-indigo-600", text: "text-indigo-600", light: "bg-indigo-50" },
    "TIU": { color: "emerald", bg: "bg-emerald-600", text: "text-emerald-600", light: "bg-emerald-50" },
    "TKP": { color: "amber", bg: "bg-amber-500", text: "text-amber-600", light: "bg-amber-50" }
  }[soalAktif.kategori] || { color: "indigo", bg: "bg-indigo-600", text: "text-indigo-600", light: "bg-indigo-50" };

  main.innerHTML = `
    <div class="max-w-2xl mx-auto pb-32">
      
      <!-- HEADER STICKY (Sisa Waktu & Progress) -->
      <div class="sticky top-0 z-40 bg-slate-50/90 backdrop-blur-md pt-2 pb-4 border-b border-slate-200">
        <div class="flex justify-between items-center px-1 mb-3">
          <div class="flex items-center space-x-2">
            <span class="w-2 h-2 rounded-full ${config.bg} animate-pulse"></span>
            <span class="text-[11px] font-black text-slate-500 uppercase tracking-tighter">Sisa Waktu:</span>
            <span id="exam-timer" class="text-sm font-mono font-black text-slate-800">--:--</span>
          </div>
          <div class="text-[11px] font-black text-slate-400 uppercase">
            Soal <span class="text-slate-900">${activeIdx + 1}</span> / ${totalSoal}
          </div>
        </div>
        <!-- Progress Bar Halus -->
        <div class="h-1.5 w-full bg-slate-200 rounded-full overflow-hidden">
          <div class="h-full ${config.bg} transition-all duration-500" style="width: ${((activeIdx + 1) / totalSoal) * 100}%"></div>
        </div>
      </div>

      <!-- AREA SOAL -->
      <div class="mt-6 px-1 animate-scale-up">
        <div class="flex items-center space-x-2 mb-4">
           <span class="px-2 py-1 ${config.light} ${config.text} rounded text-[10px] font-black uppercase tracking-widest border border-${config.color}-100">
             ${soalAktif.kategori}
           </span>
           <span class="text-[10px] text-slate-400 font-medium">| ${soalAktif.sub_kategori}</span>
        </div>

        <!-- Teks Pertanyaan Utama -->
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 mb-6">
          <h2 class="soal-text text-lg md:text-xl font-bold text-slate-900">
            ${soalAktif.pertanyaan}
          </h2>
          ${soalAktif.url_gambar ? `
            <div class="mt-5 rounded-xl overflow-hidden border border-slate-100 bg-slate-50">
              <img src="${soalAktif.url_gambar}" class="w-full h-auto object-contain max-h-72 mx-auto">
            </div>
          ` : ''}
        </div>

        <!-- PILIHAN JAWABAN -->
        <div class="space-y-3">
          ${['A', 'B', 'C', 'D', 'E'].map(opt => {
            const isSelected = jwbDipilih === opt;
            const text = soalAktif[`opsi_${opt.toLowerCase()}`];
            const img = soalAktif[`img_${opt.toLowerCase()}`];
            
            return `
              <div onclick="pilihOpsi('${opt}')" class="active-scale transition-all group">
                <div class="flex items-start p-4 rounded-2xl border-2 transition-all cursor-pointer
                  ${isSelected 
                    ? `border-${config.color}-500 ${config.light} shadow-md` 
                    : 'border-white bg-white hover:border-slate-200 shadow-sm'}">
                  
                  <div class="flex-shrink-0 w-9 h-9 rounded-xl flex items-center justify-center font-black text-sm 
                    ${isSelected ? `${config.bg} text-white` : 'bg-slate-100 text-slate-500'}">
                    ${opt}
                  </div>

                  <div class="ml-4 flex-grow">
                    <p class="text-sm md:text-base font-semibold leading-relaxed ${isSelected ? `text-${config.color}-900` : 'text-slate-700'}">
                      ${text}
                    </p>
                    ${img ? `<img src="${img}" class="mt-3 rounded-lg max-h-40 border border-slate-100 bg-white">` : ''}
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>

      <!-- NAVIGASI FLOATING (Bawah HP) -->
      <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-xl border-t border-slate-200 z-50">
        <div class="max-w-2xl mx-auto flex items-center space-x-3">
          <!-- Tombol Back -->
          <button onclick="navBack()" ${activeIdx === 0 ? 'disabled' : ''} 
            class="w-12 h-12 flex items-center justify-center rounded-2xl bg-slate-100 text-slate-600 disabled:opacity-20 active-scale transition-all">
            <i class="fa-solid fa-chevron-left"></i>
          </button>
          
          <!-- Nomor Soal (Horizontal Scroll) -->
          <div class="flex-grow overflow-x-auto nav-scroll py-1 px-1">
             <div class="flex space-x-2">
               ${testSession.soal.map((_, i) => {
                 const terisi = testSession.jawaban[testSession.soal[i].id_soal];
                 const aktif = i === activeIdx;
                 return `
                   <button onclick="pindahSoal(${i})" class="flex-shrink-0 w-9 h-9 rounded-xl text-[11px] font-black transition-all
                     ${aktif ? `${config.bg} text-white scale-110 shadow-lg shadow-${config.color}-200` : (terisi ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-200 text-slate-500')}">
                     ${i + 1}
                   </button>
                 `;
               }).join('')}
             </div>
          </div>

          <!-- Tombol Next / Selesai -->
          <button onclick="${activeIdx === totalSoal - 1 ? 'confirmSelesaiUjian()' : 'navNext()'}" 
            class="flex-grow h-12 px-6 rounded-2xl font-black text-xs tracking-widest transition-all active-scale shadow-lg
              ${activeIdx === totalSoal - 1 ? 'bg-rose-600 text-white' : 'bg-slate-900 text-white'}">
            ${activeIdx === totalSoal - 1 ? 'FINISH' : 'NEXT'}
          </button>
        </div>
      </div>

    </div>
  `;
}
    function pindahSoal(idx) {
      if (testSession) {
        testSession.index_aktif = idx;
        renderUjian();
      }
    }

    function navNext() {
      if (testSession && testSession.index_aktif < testSession.soal.length - 1) {
        testSession.index_aktif++;
        renderUjian();
      }
    }

    function navBack() {
      if (testSession && testSession.index_aktif > 0) {
        testSession.index_aktif--;
        renderUjian();
      }
    }

    function pilihOpsi(opt) {
      if (testSession) {
        const activeSoal = testSession.soal[testSession.index_aktif];
        testSession.jawaban[activeSoal.id_soal] = opt;
        renderUjian();
      }
    }

    function finishUjianAuto() {
      showModal("Waktu Habis", "Ujian selesai otomatis.", "info");
      submitJawabanUjian();
    }

    function confirmSelesaiUjian() {
      showModal("Selesaikan Ujian?", "Yakin ingin mengakhiri sesi pengerjaan?", "warning", true, () => {
        submitJawabanUjian();
      });
    }

    function submitJawabanUjian() {
      clearInterval(timerInterval);
      if (!testSession) return;

      let skorTotal = 0;
      const skorKategori = {};

      testSession.soal.forEach(s => {
        if (!s) return;
        const jwb = testSession.jawaban[s.id_soal];
        const poin = (s.bobot_nilai && s.bobot_nilai[jwb]) || 0;
        skorTotal += poin;

        if (!skorKategori[s.kategori]) skorKategori[s.kategori] = 0;
        skorKategori[s.kategori] += poin;
      });

      const list = getDB('cat_riwayat') || [];
      const nextID = "RW" + String(list.length + 1).padStart(3, '0');

      const log = {
        id_riwayat: nextID,
        id_user: currentUser ? currentUser.id_user : "USR_TEMP",
        nama_user: currentUser ? currentUser.nama : "Guest",
        wilayah_user: (currentUser && currentUser.wilayah) || "Jawa Barat",
        tipe_aktivitas: testSession.tipe_aktivitas,
        id_tryout: testSession.id_tryout,
        kategori_latihan: testSession.kategori_latihan,
        skor_total: skorTotal,
        skor_per_kategori: skorKategori,
        status_kelulusan: testSession.tipe_aktivitas === 'tryout' ? (skorTotal >= 15 ? 'Lulus' : 'Tidak Lulus') : 'N/A',
        jawaban_peserta: testSession.jawaban,
        waktu_mulai: testSession.waktu_mulai,
        waktu_selesai: new Date().toISOString()
      };

      list.push(log);
      setDB('cat_riwayat', list);
      saveRiwayatToCloud(log); // Kirim hasil ujian ke Google Sheets

      reviewSession = log;
      testSession = null;

      showModal("Ujian Selesai", `Skor Anda: ${skorTotal} Poin.`, "success");
      navigate('review_ujian');

    }

    let reviewSession = null;

    function reviewRiwayat(id) {
      const rw = (getDB('cat_riwayat') || []).find(r => r && r.id_riwayat === id);
      if (rw) {
        reviewSession = rw;
        navigate('review_ujian');
      }
    }

    function renderReviewUjian() {
      const main = document.getElementById('main-content');
      if (!reviewSession || !main) {
        if (main) main.innerHTML = `<p class="text-center py-12 text-slate-600 ">Tidak ada review aktif.</p>`;
        return;
      }

      const allSoal = getDB('cat_soal') || [];
      let soalReview = [];

      if (reviewSession.tipe_aktivitas === 'tryout') {
        const to = (getDB('cat_tryout') || []).find(t => t && t.id_tryout === reviewSession.id_tryout);
        soalReview = to && to.daftar_id_soal ? to.daftar_id_soal.map(sid => allSoal.find(s => s && s.id_soal === sid)).filter(Boolean) : [];
      } else {
        const jwbPesertaObj = reviewSession.jawaban_peserta || {};
        soalReview = Object.keys(jwbPesertaObj).map(sid => allSoal.find(s => s && s.id_soal === sid)).filter(Boolean);
      }

      main.innerHTML = `
        <div class="max-w-4xl mx-auto space-y-6">
          <div class="bg-indigo-900 rounded-2xl p-6 text-white flex flex-col md:flex-row justify-between items-start md:items-center shadow">
            <div>
              <span class="text-[10px] bg-indigo-700 text-indigo-200 px-2 py-1 rounded font-bold uppercase tracking-wider mb-2 inline-block">Review Penjelasan</span>
              <h2 class="text-xl font-bold">${reviewSession.tipe_aktivitas === 'tryout' ? 'Simulasi Paket Try Out' : 'Latihan Mandiri Cerdas'}</h2>
              <p class="text-xs text-indigo-200">Selesai pada: ${new Date(reviewSession.waktu_selesai).toLocaleString()}</p>
            </div>
            <div class="mt-4 md:mt-0 flex items-center space-x-3">
              <div class="bg-indigo-800 border border-indigo-700 px-4 py-2.5 rounded-xl text-center">
                <span class="text-[10px] text-indigo-300 block">SKOR TOTAL</span>
                <span class="text-xl font-black text-amber-400">${reviewSession.skor_total} Poin</span>
              </div>
              <button onclick="navigate('dashboard_peserta')" class="bg-white hover:bg-slate-100 text-indigo-900 font-bold px-4 py-2.5 rounded-xl text-xs transition">
                Kembali ke Portal
              </button>
            </div>
          </div>

          <div class="space-y-6">
            ${soalReview.map((s, idx) => {
        const jwbPeserta = (reviewSession.jawaban_peserta && reviewSession.jawaban_peserta[s.id_soal]) || "Tidak Dijawab";
        const jwbBenar = s.kunci_jawaban;
        const isBetul = jwbPeserta === jwbBenar;

        return `
                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm space-y-4">
                  <div class="flex justify-between items-center pb-2 border-b text-xs">
                    <span class="font-extrabold text-indigo-600">No. ${idx + 1} (${s.kategori} - ${s.sub_kategori})</span>
                    <span class="px-2.5 py-0.5 rounded-full font-bold ${isBetul ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}">
                      ${isBetul ? 'Sempurna' : 'Perlu Diulas'}
                    </span>
                  </div>

                  <p class="text-slate-800 font-semibold text-sm">${s.pertanyaan}</p>

                  <div class="space-y-2 text-xs">
                    ${['A', 'B', 'C', 'D', 'E'].map(opt => {
          const text = s[`opsi_${opt.toLowerCase()}`];
          let borderClass = "border-slate-200";
          let bgClass = "bg-white";

          if (opt === jwbBenar) {
            borderClass = "border-emerald-500 ring-2 ring-emerald-100";
            bgClass = "bg-emerald-50/30";
          } else if (opt === jwbPeserta && !isBetul) {
            borderClass = "border-rose-500 ring-2 ring-rose-100";
            bgClass = "bg-rose-50/30";
          }

          return `
                        <div class="p-3 border rounded-xl flex justify-between items-center ${borderClass} ${bgClass}">
                          <span><strong>${opt}.</strong> ${text}</span>
                          <span class="text-[10px] text-slate-600  font-mono">Poin: ${s.bobot_nilai?.[opt] || 0}</span>
                        </div>
                      `;
        }).join('')}
                  </div>

                  <div class="p-4 bg-indigo-50/50 rounded-xl border border-indigo-100 text-xs">
                    <strong class="text-indigo-900 block mb-1">Pembahasan Detail:</strong>
                    <p class="text-slate-600 leading-relaxed">${s.pembahasan}</p>
                  </div>
                </div>
              `;
      }).join('')}
          </div>
        </div>
      `;
    }

    window.onload = function () {
      initDatabase();
      navigate('login');
    };
  </script>
